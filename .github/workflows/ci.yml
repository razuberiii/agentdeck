name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run test:e2e
      - run: bash -n scripts/agentdeckctl scripts/deploy.sh scripts/setup.sh scripts/candidate-lifecycle.sh deploy/install-units.sh
